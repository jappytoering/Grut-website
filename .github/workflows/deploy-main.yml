name: Deploy naar Cloud86 Main / Productie
on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Sync naar Cloud86 Productie
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: www/ # Of de directory waar je hoofdwebsite staat (vaak public_html/ of domains/grutdesigners.nl/public_html/)
        exclude: |
          **/.git*
          **/.github*
          V1_Backup/**
